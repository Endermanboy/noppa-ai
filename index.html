<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noppa</title>
<link rel="icon" type="image/png" href="icons/ok.png">
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#111;color:#fff;margin:0} .box{text-align:center;background:#222;padding:30px;border-radius:20px;box-shadow:0 0 20px rgba(255,255,255,.1)} button{padding:12px 20px;font-size:18px;border:none;border-radius:12px;cursor:pointer} .dice{font-size:80px;margin:20px}
</style>
</head>
<body>
<div class="box">
<h1>🎲 Noppa</h1>
<div class="dice" id="dice">⚀</div>
<button onclick="rollDice()">Heitä</button>
<p id="text">Paina nappia!</p>
</div>
<script>
const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
function rollDice(){const n=Math.floor(Math.random()*6);document.getElementById('dice').textContent=faces[n];document.getElementById('text').textContent='Sait numeron '+(n+1)+'!';}
</script>
<script src="menu.js"></script>
</body>
</html>
